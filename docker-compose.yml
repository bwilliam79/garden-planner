services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PORT=3001
      - DATA_DIR=/data
    volumes:
      - ./data:/data
    networks:
      - garden-net

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      - backend
    networks:
      - garden-net

networks:
  garden-net:
    driver: bridge
